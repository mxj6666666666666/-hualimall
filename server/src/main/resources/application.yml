spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hualimall?useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update  # 自动创建/更新表结构
    show-sql: true      # 控制台打印 SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: INFO

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}

auth:
  cookie:
    name: ${AUTH_COOKIE_NAME:HM_TOKEN}
    max-age-seconds: ${AUTH_COOKIE_MAX_AGE_SECONDS:604800}
    secure: ${AUTH_COOKIE_SECURE:true}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}

# ===== 支付宝沙箱配置 =====
alipay:
  app-id: ${ALIPAY_APP_ID}
  app-private-key: ${ALIPAY_APP_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  notify-url: ${ALIPAY_NOTIFY_URL}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:5173/pay-result.html}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  sign-type: RSA2
  charset: UTF-8
  format: JSON

wechat-pay:
  app-id: ${WECHAT_PAY_APP_ID:}
  mch-id: ${WECHAT_PAY_MCH_ID:}
  api-v2-key: ${WECHAT_PAY_API_V2_KEY:}
