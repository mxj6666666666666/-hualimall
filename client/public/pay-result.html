<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支付结果跳转中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #334155;
      }
      .tip {
        padding: 20px 24px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="tip">支付结果处理中，正在返回订单详情...</div>
    <script>
      (function () {
        var key = "hm_paying_order_id";
        var orderId = localStorage.getItem(key);
        if (!orderId) {
          window.location.replace("/orders");
          return;
        }

        var target = "/orders/" + encodeURIComponent(orderId) + "?paid=1";
        localStorage.removeItem(key);

        if (window.opener && !window.opener.closed) {
          window.opener.location.href = target;
          window.close();
          return;
        }

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
